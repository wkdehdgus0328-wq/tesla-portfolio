  <script>
    window.onerror = function (msg, url, line, col, error) {
      document.body.innerHTML = '<div style="color:red; font-size: 16px; padding: 20px; background: white; z-index: 9999; position: absolute; max-width: 100vw; word-wrap: break-word;">Error: ' + msg + '<br>' + (error && error.stack ? error.stack : '') + '</div>';
    };
    window.addEventListener('unhandledrejection', function (event) {
      document.body.innerHTML = '<div style="color:red; font-size: 16px; padding: 20px; background: white; z-index: 9999; position: absolute; max-width: 100vw; word-wrap: break-word;">Unhandled Rejection: ' + (event.reason ? event.reason.toString() + '<br>' + (event.reason.stack || '') : 'Unknown') + '</div>';
    });
  </script>
